<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CIEL // PFMP</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body data-page="pfmp">
  <div class="noise"></div>
  <div class="page-shell">
    <header class="topbar panel">
      <div>
        <p class="eyebrow">Bac Pro CIEL // Skill Matrix</p>
        <h1 class="topbar-title">Gestion PFMP</h1>
      </div>
      <nav class="nav-tabs">
        <a class="nav-tab" href="index.html">Accueil</a>
        <a class="nav-tab" href="dashboard.html">Dashboard</a>
        <a class="nav-tab" href="classes.html">Classes</a>
        <a class="nav-tab" href="evaluations.html">Évaluations</a>
        <a class="nav-tab active" href="pfmp.html">PFMP</a>
        <span id="session-role" class="badge accent"></span>
        <button id="logout-button" class="ghost-button" type="button">Déconnexion</button>
      </nav>
    </header>

    <main class="evaluation-layout">
      <section class="panel">
        <div class="section-head">
          <div>
            <p class="eyebrow">PFMP Scope</p>
            <h2>Filtrer par classe et élève</h2>
          </div>
        </div>
        <div class="stack-form">
          <label class="field">
            <span>Classe</span>
            <select id="pfmp-class-select"></select>
          </label>
          <label class="field">
            <span>Élève</span>
            <select id="pfmp-student-select"></select>
          </label>
          <label class="field">
            <span>Période PFMP</span>
            <select id="pfmp-period-select"></select>
          </label>
        </div>
      </section>

      <section class="panel">
        <div class="section-head">
          <div>
            <p class="eyebrow">Quick Status</p>
            <h2>Résumé PFMP</h2>
          </div>
        </div>
        <div id="pfmp-summary-cards" class="class-cards"></div>
        <div id="pfmp-periods-overview" class="periods-grid"></div>
        <button id="export-pfmp-button" class="primary-button" type="button">Exporter suivi PFMP</button>
      </section>

      <section class="panel wide-panel">
        <div class="section-head">
          <div>
            <p class="eyebrow">PFMP Sheet</p>
            <h2>Fiche PFMP élève</h2>
          </div>
        </div>
        <form id="pfmp-form" class="pfmp-form-grid">
          <label class="field">
            <span>Entreprise</span>
            <input id="pfmp-company" type="text">
          </label>
          <label class="field">
            <span>Commentaire</span>
            <input id="pfmp-comment" type="text">
          </label>
          <label class="field wide-field">
            <span>Adresse du stage</span>
            <input id="pfmp-address" type="text">
          </label>
          <label class="field">
            <span>Tuteur</span>
            <input id="pfmp-tutor" type="text">
          </label>
          <label class="field">
            <span>Mail tuteur</span>
            <input id="pfmp-email" type="email">
          </label>
          <label class="field">
            <span>Téléphone tuteur</span>
            <input id="pfmp-phone" type="text">
          </label>
          <label class="field">
            <span>Convention transmise</span>
            <input id="pfmp-sent" type="date">
          </label>
          <label class="field">
            <span>Convention signée entreprise</span>
            <input id="pfmp-signed-company" type="date">
          </label>
          <label class="field">
            <span>Convention signée parents</span>
            <input id="pfmp-signed-parents" type="date">
          </label>
          <label class="field">
            <span>Convention signée lycée</span>
            <input id="pfmp-signed-school" type="date">
          </label>
          <label class="field">
            <span>Professeur référent</span>
            <input id="pfmp-teacher" type="text">
          </label>
          <label class="field">
            <span>Date de visite</span>
            <input id="pfmp-visit" type="text" placeholder="Ex. 12/01/2026 à 17h15 (téléphone)">
          </label>
          <label class="field">
            <span>Rapport rendu</span>
            <input id="pfmp-report" type="date">
          </label>
          <label class="field">
            <span>Livret d'évaluation</span>
            <input id="pfmp-booklet" type="date">
          </label>
          <label class="field">
            <span>Fiche de présence</span>
            <input id="pfmp-attendance" type="date">
          </label>
          <button class="primary-button" type="submit">Enregistrer la fiche PFMP</button>
        </form>
      </section>

      <section class="panel wide-panel">
        <div class="section-head">
          <div>
            <p class="eyebrow">PFMP Registry</p>
            <h2>Suivi de la classe</h2>
          </div>
        </div>
        <div id="pfmp-directory" class="student-directory"></div>
      </section>
    </main>
  </div>

  <script src="app.js"></script>
</body>
</html>
