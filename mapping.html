<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CIEL // Cartographie</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body data-page="mapping">
  <div class="noise"></div>
  <div class="page-shell">
    <header class="topbar panel">
      <div>
        <p class="eyebrow">Bac Pro CIEL // Skill Matrix</p>
        <h1 class="topbar-title">Cartographie</h1>
      </div>
      <nav class="nav-tabs app-nav">
        <a class="nav-tab" href="index.html">Accueil</a>
        <span id="session-role" class="badge accent"></span>
        <button id="logout-button" class="ghost-button" type="button">Déconnexion</button>
      </nav>
      <a class="topbar-brandmark" href="index.html" aria-label="CIEL Matrix"><img src="ciel-matrix-logo.svg" alt="CIEL Matrix"></a>
    </header>

    <section class="hero panel">
      <div class="hero-copy">
        <p class="eyebrow">Tracabilite</p>
        <h2 class="hero-title">Competence vers seances et PFMP</h2>
        <p class="hero-text">Visualise, pour chaque competence, les traces pedagogiques disponibles : seances, activites et observations PFMP.</p>
      </div>
      <section class="hero-side">
        <div class="mini-grid">
          <label class="field">
            <span>Classe</span>
            <select id="mapping-class-select"></select>
          </label>
          <label class="field">
            <span>Domaine</span>
            <select id="mapping-domain-select"></select>
          </label>
          <label class="field">
            <span>Compétence</span>
            <select id="mapping-skill-select"></select>
          </label>
        </div>
        <div class="student-badges">
          <button id="mapping-export-pdf" class="ghost-button" type="button">Exporter PDF cartographie</button>
        </div>
        <p id="mapping-meta" class="results-count"></p>
      </section>
    </section>

    <main class="dashboard-layout">
      <section class="panel">
        <div class="section-head">
          <div>
            <p class="eyebrow">Matrice</p>
            <h2>Cartographie par competence</h2>
          </div>
        </div>
        <div id="mapping-grid" class="catalog-grid"></div>
      </section>
    </main>
  </div>

  <script src="app.js"></script>
</body>
</html>
