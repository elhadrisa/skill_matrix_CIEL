<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CIEL // Remédiations PFMP</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body data-page="remediation_pfmp">
  <div class="noise"></div>
  <div class="page-shell">
    <header class="topbar panel">
      <div>
        <p class="eyebrow">Bac Pro CIEL // Skill Matrix</p>
        <h1 class="topbar-title">Remédiations PFMP</h1>
      </div>
      <nav class="nav-tabs">
        <a class="nav-tab" href="index.html">Accueil</a>
        <a class="nav-tab" href="dashboard.html">Dashboard</a>
        <a class="nav-tab" href="classes.html">Classes</a>
        <a class="nav-tab" href="evaluations.html">Évaluations</a>
        <a class="nav-tab" href="pfmp.html">PFMP</a>
        <span id="session-role" class="badge accent"></span>
        <button id="logout-button" class="ghost-button" type="button">Déconnexion</button>
      </nav>
      <a class="topbar-brandmark" href="index.html" aria-label="CIEL Matrix"><img src="ciel-matrix-logo.svg" alt="CIEL Matrix"></a>
    </header>

    <main class="dashboard-layout">
      <section class="panel">
        <div class="section-head">
          <div>
            <p class="eyebrow">Remédiation</p>
            <h2 id="remediation-scope-title">Vue remédiation PFMP</h2>
          </div>
        </div>
        <div class="mini-grid">
          <label class="field">
            <span>Classe</span>
            <select id="remediation-class-select"></select>
          </label>
          <label class="field">
            <span>Élève</span>
            <select id="remediation-student-select"></select>
          </label>
          <label class="field">
            <span>Professeur</span>
            <select id="remediation-teacher-select"></select>
          </label>
        </div>
        <label class="field inline-field">
          <span>Gravité</span>
          <select id="remediation-severity-select">
            <option value="all">Toutes</option>
            <option value="critical">Critique</option>
            <option value="warning">Avertissement</option>
            <option value="info">Information</option>
          </select>
        </label>
        <div class="student-badges">
          <button id="remediation-export-pdf" class="ghost-button" type="button">Exporter PDF remédiation</button>
        </div>
      </section>

      <section class="panel">
        <div class="section-head">
          <div>
            <p class="eyebrow">Global</p>
            <h2>Remédiation générale</h2>
          </div>
        </div>
        <div id="remediation-summary-grid" class="class-cards"></div>
      </section>

      <section class="panel">
        <div class="section-head">
          <div>
            <p class="eyebrow">PFMP</p>
            <h2 id="remediation-detail-title">Remédiation PFMP</h2>
          </div>
        </div>
        <div id="remediation-detail-grid" class="class-cards"></div>
      </section>
    </main>
  </div>

  <script src="app.js"></script>
  <script src="custom-selects.js"></script>
</body>
</html>
