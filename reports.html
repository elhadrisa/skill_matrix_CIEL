<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CIEL Matrix // Rapports</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body data-page="reports">
  <div class="noise"></div>
  <div class="page-shell">
    <header class="topbar panel">
      <div>
        <p class="eyebrow">Bac Pro CIEL // Skill Matrix</p>
        <h1 class="topbar-title">Rapports premium</h1>
      </div>
      <nav class="nav-tabs app-nav">
        <a class="nav-tab" href="index.html">Accueil</a>
        <span id="session-role" class="badge accent"></span>
        <button id="logout-button" class="ghost-button" type="button">Déconnexion</button>
      </nav>
      <a class="topbar-brandmark" href="index.html" aria-label="CIEL Matrix"><img src="ciel-matrix-logo.svg" alt="CIEL Matrix"></a>
    </header>

    <section class="hero panel">
      <div class="hero-copy">
        <p class="eyebrow">Direction / Inspection</p>
        <h2 class="hero-title">Synthèse institutionnelle</h2>
        <p class="hero-text">Vue consolidée pour pilotage pédagogique, certification, PFMP et cohérence du référentiel.</p>
      </div>
      <section class="hero-side">
        <div class="hero-side-head">
          <div>
            <h2>Classe ou cohorte</h2>
            <p id="reports-meta" class="results-count"></p>
          </div>
          <div class="student-badges">
            <button id="reports-export-pdf" class="ghost-button" type="button">Exporter PDF</button>
          </div>
        </div>
        <div class="mini-grid">
          <label class="field">
            <span>Classe</span>
            <select id="reports-class-select"></select>
          </label>
        </div>
      </section>
    </section>

    <main class="dashboard-layout">
      <section class="panel">
        <div class="section-head">
          <div>
            <p class="eyebrow">Pilotage</p>
            <h2>Indicateurs globaux</h2>
          </div>
        </div>
        <div id="reports-kpis" class="stats-grid"></div>
      </section>

      <section class="panel">
        <div class="section-head">
          <div>
            <p class="eyebrow">Alertes</p>
            <h2>Points de vigilance</h2>
          </div>
        </div>
        <div id="reports-alerts" class="student-directory"></div>
      </section>
    </main>
  </div>

  <script src="app.js"></script>
</body>
</html>
